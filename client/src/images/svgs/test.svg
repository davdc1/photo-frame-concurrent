<svg width="400" height="800" viewBox="0 0 400 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .wave {
      <!-- animation: waveMove 28s linear infinite; -->
      animation: waveMove 8s linear infinite;
    }
    
    <!-- .wave1 { animation-duration: 32s; }
    .wave2 { animation-duration: 41s; }
    .wave3 { animation-duration: 26s; }
    .wave4 { animation-duration: 35s; } -->

    .wave1 { animation-duration: 22s; }
    .wave2 { animation-duration: 16s; }
    .wave3 { animation-duration: 12s; }
    .wave4 { animation-duration: 8s; }
    
    @keyframes waveMove {
      from { transform: translateX(0); }
      to   { transform: translateX(-300px); }   /* One full wave period */
    }
  </style>

  <rect width="400" height="800" fill="#F7F9FE"/>

  <!-- Wave 1 -->
  <g class="wave wave1">
    <path d="M0 200 
             C100 150 200 250 300 200 
             C400 150 500 250 600 200 
             C700 150 800 250 900 200 
             C1000 150 1100 250 1200 200 
             V800 H0 Z" 
          fill="#E1E9F4" opacity="0.5"/>
  </g>

  <!-- Wave 2 -->
  <g class="wave wave2">
    <path d="M-100 300 
             C50 250 150 350 300 300 
             C450 250 550 350 700 300 
             C850 250 950 350 1100 300 
             C1250 250 1350 350 1500 300 
             V800 H-100 Z" 
          fill="#D2DEEE" opacity="0.4"/>
  </g>

  <!-- Wave 3 -->
  <g class="wave wave3">
    <path d="M0 450 
             C120 400 250 500 350 450 
             C480 400 580 500 700 450 
             C820 400 950 500 1050 450 
             C1180 400 1280 500 1400 450 
             V800 H0 Z" 
          fill="#C3D3E8" opacity="0.3"/>
  </g>

  <!-- Wave 4 -->
  <g class="wave wave4">
    <path d="M-50 600 
             C80 550 220 650 350 600 
             C480 550 620 650 750 600 
             C880 550 1020 650 1150 600 
             C1280 550 1420 650 1550 600 
             V800 H-50 Z" 
          fill="#B4C8E2" opacity="0.2"/>
  </g>
</svg>