app = 'photo-frame-worker'
primary_region = 'arn'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "10s"
  timeout = "2s"
  method = "get"
  path = "/health"
  grace_period = "90s" # /health is instant; CLIP loads on first request / SQS job

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2048' # Max allowed on this VM size
